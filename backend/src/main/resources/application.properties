spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Cache GitHub API responses to reduce rate-limit pressure and speed up repeated analyses.
github.cache.ttl-seconds=${GITHUB_CACHE_TTL_SECONDS:300}

#---
spring.config.activate.on-profile=dev

spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:github_analyzer}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

github.token=${GITHUB_TOKEN:}

app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}



#---
spring.config.activate.on-profile=docker-compose

server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

github.token=${GITHUB_TOKEN:}
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}



#---
spring.config.activate.on-profile=prod

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

github.token=${GITHUB_TOKEN}
app.cors.allowed-origins=${FRONTEND_URL}

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Email notifications are disabled by default. Enable them after SMTP variables are configured.
app.notifications.email.enabled=${EMAIL_NOTIFICATIONS_ENABLED:false}
app.notifications.email.from=${EMAIL_FROM:no-reply@github-analyser.local}
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE:true}
